<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

    :root {
      --color-white: hsl(0, 0%, 100%);
      --color-light-grey: hsl(212, 45%, 89%);
      --color-grayish-blue: hsl(220, 15%, 55%);
      --color-dark-blue: hsl(218, 44%, 22%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
    }

    p {
      font-size: 15px;
    }

    .container-center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      height: 100vh;
      background-color: var(--color-light-grey);
      padding: 0 1.5rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      background-color: var(--color-white);
      border-radius: 15px;
      padding: .8rem .8rem 2rem .8rem;
    }

    .card-img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 10px;
    }

    .card-title {
      color: var(--color-dark-blue);
      font-weight: 700;
    }

    .card-description {
      color: var(--color-grayish-blue);
      font-weight: 400;
    }

    .card-title,
    .card-description {
      padding: 0 .8rem;
    }

    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }

    @media only screen and (min-width: 1440px) {
      .card {
        width: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="container-center">
    <article class="card">
      <img class="card-img" src="./images/image-qr-code.png" alt="QR code" />
      <h3 class="card-title">Improve your front-end skills by building projects</h3>
      <p class="card-description">Scan the QR code to visit Frontend Mentor and take your coding skills to the next
        level</p>
    </article>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="https://github.com/azianasw">azianasw</a>.
    </div>
  </div>
</body>

</html>
